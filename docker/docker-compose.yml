services:
  hub:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: onebox-hub
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hub-network

  db:
    image: postgres:15-alpine
    container_name: hub-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hub_pass}
      POSTGRES_DB: ${DB_NAME:-hub_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hub_user} -d ${DB_NAME:-hub_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hub-network

  redis:
    image: redis:7-alpine
    container_name: hub-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - hub-network

networks:
  hub-network:
    driver: bridge

volumes:
  pgdata:
