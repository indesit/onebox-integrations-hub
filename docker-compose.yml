version: "3.9"

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hub_user
      POSTGRES_PASSWORD: hub_pass
      POSTGRES_DB: hub_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  hub:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config       # live-reload YAML rules without rebuild
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: rq worker --with-scheduler default
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  db_data:
